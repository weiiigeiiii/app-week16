<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手測試</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 我的 Gemini AI 應對專案</div>
        <div class="chat-box" id="chatBox">
            <div class="message model">後台已與 Google AI Studio 連線，請輸入訊息...</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="隨便輸入點什麼...">
            <button onclick="sendMessage()">發送</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
